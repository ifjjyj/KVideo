a: &a {type: url-test, interval: 1800, tolerance: 50, url: 'https://www.gstatic.com/generate_204', lazy: true}
j: &j {type: http, interval: 86400, override: { client-fingerprint: chrome }, health-check: { enable: true, url: 'https://www.gstatic.com/generate_204', interval: 3600 } }
m: &m {type: select, proxies: ["hk", "jp", "us"]}
r: &r {type: select, proxies: ["jp", "us", "mt", "hk"]}
n: &n [223.5.5.5, 119.29.29.29, 211.136.112.50, 211.136.150.66]
d: &d {type: http, format: mrs, interval: 86400, behavior: domain}
i: &i {type: http, format: mrs, interval: 86400, behavior: ipcidr}
proxy-providers:
  bxx: { <<: *j, url: "https://bxx.xx.kg:296/a?format=clash", path: ./bxx.yaml }
  ouu: { <<: *j, url: "https://ouu.xx.kg:296/a?format=clash", path: ./ouu.yaml }
  ovv: { <<: *j, url: "https://ovv.xx.kg:296/a?format=clash", path: ./ovv.yaml }
  fjj: { <<: *j, url: "https://fjj.xx.kg:296/a?format=clash", path: ./fjj.yaml }
  exx: { <<: *j, url: "https://exx.xx.kg:296/a?format=clash", path: ./exx.yaml }
port: 8080
socks-port: 1080
mixed-port: 7890
redir-port: 7891
tproxy-port: 7892
allow-lan: true
bind-address: "*"
mode: rule
log-level: warning
ipv6: false
external-controller: 0.0.0.0:9090
external-ui: "ui"
secret: "14285700"
unified-delay: true
tcp-concurrent: true
find-process-mode: off
keep-alive-interval: 20
profile: { store-selected: true, store-fake-ip: true }
sniffer: {enable: true, parse-pure-ip: true, sniff: {HTTP: {ports: [80, 8080-8880], override-destination: false}, TLS: {ports: [443, 8443]}, QUIC: {ports: [443, 8443]}}, skip-domain: ["+.apple.com", "play.google.com", "+.googleapis.com", "+.gvt1.com", "+.gvt2.com", "+.gvt3.com", "+.xn--ngstr-lra8j.com"]}
tun: {enable: true, stack: system, device: nikki, auto-route: true, auto-detect-interface: true, dns-hijack: [any:53], mtu: 1400, gso: true, gro: true, strict-route: true, endpoint-independent-nat: true, udp-timeout: 600}
dns:
  enable: true
  respect-rules: true
  listen: 0.0.0.0:1053
  ipv6: false
  prefer-h3: false
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/15
  fake-ip-filter: ["rule-set:private", "rule-set:cn", "+.msftconnecttest.com", "+.msftncsi.com"]
  default-nameserver: *n
  proxy-server-nameserver: *n
  nameserver-policy: {"rule-set:private": *n, "rule-set:cn": *n, "+.xx.kg": *n}
  nameserver:
    - https://dns.google/dns-query
    - https://cloudflare-dns.com/dns-query
    - https://dns11.quad9.net/dns-query
    - https://doh.opendns.com/dns-query
    - https://public.dns.iij.jp/dns-query
    - https://dns.adguard-dns.com/dns-query
proxy-groups:
  - {name: "hk", <<: *a, filter: "(?i)港|hk|hongkong|hong kong", use: [exx]}
  - {name: "jp", <<: *a, filter: "(?i)日|jp|japan", use: [fjj]}
  - {name: "us", <<: *a, filter: "(?i)美|us|unitedstates|united states", use: [bxx, ouu, ovv]}
  - {name: "mt", <<: *m}
  - {name: "ai", <<: *r}
  - {name: "tv", <<: *r}
  - {name: "match", <<: *r}
rules:
  - DOMAIN,localhost,REJECT
  - IP-CIDR,127.0.0.0/8,REJECT,no-resolve
  - IP-CIDR6,::1/128,REJECT,no-resolve
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,3478)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,19302)),REJECT
  - DOMAIN-KEYWORD,stun,REJECT
  - DOMAIN-KEYWORD,turn,REJECT
  - DOMAIN-SUFFIX,xx.kg,DIRECT
  - RULE-SET,adrules,REJECT
  - RULE-SET,openai,ai
  - RULE-SET,anthropic,ai
  - RULE-SET,gemini,ai
  - RULE-SET,hulu,tv
  - RULE-SET,tiktok,tv
  - RULE-SET,google,mt
  - RULE-SET,private,DIRECT
  - RULE-SET,cn,DIRECT
  - RULE-SET,google_ip,mt
  - RULE-SET,telegram_ip,mt
  - RULE-SET,private_ip,DIRECT
  - RULE-SET,cn_ip,DIRECT
  - MATCH,match
rule-providers:
  adrules:      { <<: *d, url: "https://adrules.top/adrules-mihomo.mrs", path: ./adrules.mrs }
  private:      { <<: *d, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/private.mrs", path: ./private.mrs }
  google:       { <<: *d, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google.mrs", path: ./google.mrs }
  google_ip:    { <<: *i, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/google.mrs", path: ./google_ip.mrs }
  private_ip:   { <<: *i, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/private.mrs", path: ./private_ip.mrs }
  openai:       { <<: *d, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/openai.mrs", path: ./openai.mrs }
  anthropic:    { <<: *d, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/anthropic.mrs", path: ./anthropic.mrs }
  gemini:       { <<: *d, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/google-gemini.mrs", path: ./gemini.mrs }
  hulu:         { <<: *d, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/hulu.mrs", path: ./hulu.mrs }
  tiktok:       { <<: *d, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/tiktok.mrs", path: ./tiktok.mrs }
  telegram_ip:  { <<: *i, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/telegram.mrs", path: ./telegram_ip.mrs }
  cn:           { <<: *d, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite/cn.mrs", path: ./cn.mrs }
  cn_ip:        { <<: *i, url: "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip/cn.mrs", path: ./cn_ip.mrs }